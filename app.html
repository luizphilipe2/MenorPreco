<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rastreador de Preços · Menor Preço PR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: #2e2e2e;
    --border2: #3a3a3a;
    --text: #e8e8e8;
    --text2: #888;
    --text3: #555;
    --accent: #00e5a0;
    --accent2: #00b87a;
    --danger: #ff4d4d;
    --warn: #f5a623;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: 56px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .search-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    max-width: 520px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0 12px;
    transition: border-color 0.15s;
  }
  .search-bar:focus-within { border-color: var(--accent); }
  .search-bar svg { color: var(--text3); flex-shrink: 0; }

  .search-bar input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    flex: 1;
    padding: 9px 0;
  }
  .search-bar input::placeholder { color: var(--text3); }

  .raio-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text2);
    border-left: 1px solid var(--border);
    padding-left: 12px;
    white-space: nowrap;
  }
  .raio-wrap input {
    width: 40px;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    text-align: center;
  }

  .btn-buscar {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 5px;
    padding: 7px 16px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-buscar:hover { background: var(--accent2); }
  .btn-buscar:active { transform: scale(0.97); }
  .btn-buscar:disabled { opacity: 0.4; cursor: not-allowed; }

  .header-spacer { flex: 1; }

  .header-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
  }

  /* ── Main pane ── */
  .main-pane {
    overflow-y: auto;
    padding: 20px 24px;
    border-right: 1px solid var(--border);
  }

  .status-bar {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 16px;
    height: 16px;
  }
  .status-bar.loading { color: var(--accent); }
  .status-bar.error   { color: var(--danger); }

  /* Métricas */
  .metrics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .metric {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .metric-label {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .metric-val {
    font-size: 22px;
    font-weight: 300;
    color: var(--text);
  }
  .metric-val.green { color: var(--accent); }

  /* Cards de GTIN */
  .gtin-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .gtin-card:hover { border-color: var(--border2); }
  .gtin-card.selected { border-color: var(--accent); }

  .gtin-header {
    display: grid;
    grid-template-columns: 20px 140px 1fr auto auto;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    cursor: pointer;
  }

  .check {
    width: 16px;
    height: 16px;
    border: 1.5px solid var(--border2);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .check.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check.checked::after {
    content: '';
    width: 8px;
    height: 5px;
    border-left: 1.5px solid #000;
    border-bottom: 1.5px solid #000;
    transform: rotate(-45deg) translateY(-1px);
    display: block;
  }

  .gtin-code {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .gtin-code.no-gtin { color: var(--warn); }

  .gtin-desc {
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .gtin-range {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    white-space: nowrap;
  }

  .gtin-count {
    font-family: var(--mono);
    font-size: 10px;
    background: var(--bg3);
    color: var(--text3);
    padding: 2px 7px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .gtin-body {
    display: none;
    border-top: 1px solid var(--border);
    padding: 10px 14px 10px 46px;
  }
  .gtin-body.open { display: block; }

  .desc-list {
    margin-bottom: 10px;
  }
  .desc-item {
    font-size: 12px;
    color: var(--text2);
    padding: 2px 0;
  }
  .desc-item::before { content: '· '; color: var(--text3); }

  .vendas-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .vendas-table th {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-align: left;
    padding: 4px 8px 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .vendas-table td {
    padding: 5px 8px 5px 0;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
  }
  .vendas-table tr:last-child td { border-bottom: none; }
  .vendas-table td.val { font-family: var(--mono); color: var(--text); }
  .vendas-table td.val.min { color: var(--accent); }
  .vendas-table td.val.max { color: var(--danger); }
  .vendas-table td.ago { color: var(--text3); font-size: 11px; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 80px 0;
    color: var(--text3);
    font-size: 13px;
    line-height: 2;
  }
  .empty-title {
    font-size: 18px;
    font-weight: 300;
    color: var(--text2);
    margin-bottom: 8px;
    font-family: var(--mono);
  }

  /* ── Sidebar ── */
  .sidebar {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .sidebar-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .sidebar-badge {
    background: var(--accent);
    color: #000;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    padding: 1px 7px;
    border-radius: 20px;
    min-width: 20px;
    text-align: center;
  }

  .watchlist {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }

  .watch-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 6px;
    position: relative;
  }
  .watch-item:hover .watch-remove { opacity: 1; }

  .watch-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: 5px;
    flex-shrink: 0;
  }

  .watch-info { flex: 1; min-width: 0; }
  .watch-name {
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .watch-gtin {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
  }

  .watch-remove {
    position: absolute;
    top: 8px;
    right: 8px;
    opacity: 0;
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    border-radius: 3px;
    transition: opacity 0.15s, color 0.15s;
    line-height: 1;
  }
  .watch-remove:hover { color: var(--danger); }

  .watchlist-empty {
    text-align: center;
    padding: 40px 0;
    color: var(--text3);
    font-size: 12px;
    line-height: 2;
  }

  .sidebar-footer {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .btn-export {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 5px;
    padding: 9px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.03em;
  }
  .btn-export:hover { background: var(--accent2); }
  .btn-export:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-clear {
    width: 100%;
    background: none;
    color: var(--text3);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 7px;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-clear:hover { border-color: var(--danger); color: var(--danger); }

  .copy-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--accent);
    color: #000;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    padding: 8px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: all 0.2s;
    pointer-events: none;
    z-index: 100;
  }
  .copy-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Loader */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 1.5px solid var(--text3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
</style>
</head>
<body>

<div class="layout">

  <!-- Header -->
  <header>
    <div class="logo">pricewatch.pr</div>

    <div class="search-bar">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="6.5" cy="6.5" r="5"/><path d="M10.5 10.5L14 14"/>
      </svg>
      <input id="termo" type="text" placeholder="buscar produto... (ex: huevitos, arroz, café)"
             value="" autocomplete="off" />
      <div class="raio-wrap">
        <span>raio</span>
        <input id="raio" type="number" value="5" min="1" max="20" />
        <span>km</span>
      </div>
    </div>

    <button class="btn-buscar" id="btn-buscar" onclick="buscar()">buscar</button>
    <div class="header-spacer"></div>
    <div class="header-count" id="header-count"></div>
  </header>

  <!-- Main -->
  <main class="main-pane">
    <div class="status-bar" id="status"></div>

    <div class="metrics" id="metrics" style="display:none">
      <div class="metric">
        <div class="metric-label">GTINs</div>
        <div class="metric-val green" id="m-gtins">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Registros</div>
        <div class="metric-val" id="m-total">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Menor preço</div>
        <div class="metric-val" id="m-min">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Maior preço</div>
        <div class="metric-val" id="m-max">—</div>
      </div>
    </div>

    <div id="results">
      <div class="empty">
        <div class="empty-title">pricewatch.pr</div>
        busque um produto acima para explorar os GTINs<br>
        selecione os que quiser monitorar →
      </div>
    </div>
  </main>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">monitorando</span>
      <span class="sidebar-badge" id="watch-count">0</span>
    </div>

    <div class="watchlist" id="watchlist">
      <div class="watchlist-empty">
        nenhum produto selecionado ainda.<br>marque os checkboxes ao buscar.
      </div>
    </div>

    <div class="sidebar-footer">
      <button class="btn-export" id="btn-export" onclick="exportar()" disabled>
        exportar para coletor.py
      </button>
      <button class="btn-clear" onclick="limparLista()">limpar lista</button>
    </div>
  </aside>

</div>

<div class="copy-toast" id="toast"></div>

<script>
const LOCAL = '6gf96u6q8';
const BASE  = 'https://menorpreco.notaparana.pr.gov.br';

let watchlist = JSON.parse(localStorage.getItem('watchlist') || '[]');
let openCards = new Set();

// ── Busca ──────────────────────────────────────────────────────────────────

async function buscar() {
  const termo = document.getElementById('termo').value.trim();
  const raio  = document.getElementById('raio').value;
  if (!termo) return;

  setStatus('loading', '<span class="spinner"></span>buscando categorias...');
  document.getElementById('btn-buscar').disabled = true;
  document.getElementById('metrics').style.display = 'none';
  document.getElementById('results').innerHTML = '';
  document.getElementById('header-count').textContent = '';

  try {
    const catResp = await fetch(`${BASE}/api/v1/categorias?local=${LOCAL}&termo=${encodeURIComponent(termo)}&raio=${raio}`);
    const cats = (await catResp.json()).categorias || [];

    if (!cats.length) {
      setStatus('', 'nenhum resultado.');
      document.getElementById('btn-buscar').disabled = false;
      return;
    }

    let todos = [];
    for (const cat of cats) {
      setStatus('loading', `<span class="spinner"></span>${cat.desc} — ${cat.qtd} registros...`);
      let offset = 0;
      while (true) {
        const resp = await fetch(
          `${BASE}/api/v1/produtos?local=${LOCAL}&termo=${encodeURIComponent(termo)}&categoria=${cat.id}&offset=${offset}&raio=${raio}&data=-1&ordem=0`
        );
        const data = await resp.json();
        const page = data.produtos || [];
        todos = todos.concat(page);
        offset += 50;
        if (offset >= (data.total || 0) || !page.length) break;
      }
    }

    renderResultados(todos);
  } catch(e) {
    setStatus('error', 'erro: ' + e.message);
  }

  document.getElementById('btn-buscar').disabled = false;
}

document.getElementById('termo').addEventListener('keydown', e => {
  if (e.key === 'Enter') buscar();
});

// ── Render ─────────────────────────────────────────────────────────────────

function renderResultados(produtos) {
  const grupos = {};
  for (const p of produtos) {
    const key = p.gtin?.trim() || '__sem_gtin__';
    if (!grupos[key]) grupos[key] = [];
    grupos[key].push(p);
  }

  const vals = produtos.map(p => parseFloat(p.valor));
  const minVal = Math.min(...vals);
  const maxVal = Math.max(...vals);
  const gtinsValidos = Object.keys(grupos).filter(k => k !== '__sem_gtin__').length;

  document.getElementById('m-gtins').textContent = gtinsValidos;
  document.getElementById('m-total').textContent  = produtos.length;
  document.getElementById('m-min').textContent    = 'R$ ' + minVal.toFixed(2);
  document.getElementById('m-max').textContent    = 'R$ ' + maxVal.toFixed(2);
  document.getElementById('metrics').style.display = 'grid';
  document.getElementById('header-count').textContent = `${gtinsValidos} GTINs · ${produtos.length} registros`;

  const sorted = Object.entries(grupos).sort((a, b) => {
    if (a[0] === '__sem_gtin__') return 1;
    if (b[0] === '__sem_gtin__') return -1;
    return b[1].length - a[1].length;
  });

  const container = document.getElementById('results');
  container.innerHTML = '';

  for (const [gtin, items] of sorted) {
    const semGtin = gtin === '__sem_gtin__';
    const vals2   = items.map(p => parseFloat(p.valor));
    const gMin    = Math.min(...vals2);
    const gMax    = Math.max(...vals2);
    const descs   = [...new Set(items.map(p => p.desc))];
    const mainDesc = descs[0];
    const isWatched = watchlist.some(w => w.gtin === gtin);
    const isOpen    = openCards.has(gtin);

    const card = document.createElement('div');
    card.className = 'gtin-card' + (isWatched ? ' selected' : '');
    card.id = 'card-' + gtin;

    // Header
    const header = document.createElement('div');
    header.className = 'gtin-header';
    header.innerHTML = `
      <div class="check ${isWatched && !semGtin ? 'checked' : ''}" id="chk-${gtin}"></div>
      <div class="gtin-code ${semGtin ? 'no-gtin' : ''}">${semGtin ? 'sem GTIN' : gtin}</div>
      <div class="gtin-desc">${mainDesc}${descs.length > 1 ? ` <span style="color:var(--text3);font-size:11px">+${descs.length-1} var.</span>` : ''}</div>
      <div class="gtin-range">R$ ${gMin.toFixed(2)} – R$ ${gMax.toFixed(2)}</div>
      <div class="gtin-count">${items.length} venda${items.length > 1 ? 's' : ''}</div>
    `;

    // Checkbox toggle
    header.querySelector('.check').addEventListener('click', e => {
      e.stopPropagation();
      if (semGtin) return;
      toggleWatch(gtin, mainDesc, items.length);
    });

    // Expand toggle
    header.addEventListener('click', () => {
      const body = document.getElementById('body-' + gtin);
      const isNowOpen = body.classList.toggle('open');
      if (isNowOpen) openCards.add(gtin); else openCards.delete(gtin);
    });

    // Body
    const body = document.createElement('div');
    body.className = 'gtin-body' + (isOpen ? ' open' : '');
    body.id = 'body-' + gtin;

    // Descrições
    const descHtml = descs.slice(0, 5).map(d =>
      `<div class="desc-item">${d}</div>`
    ).join('') + (descs.length > 5 ? `<div class="desc-item" style="color:var(--text3)">+${descs.length-5} outras descrições</div>` : '');

    // Tabela de vendas (top 8 mais baratas)
    const vendas = [...items].sort((a, b) => parseFloat(a.valor) - parseFloat(b.valor)).slice(0, 8);
    const vendasHtml = vendas.map(p => {
      const v   = parseFloat(p.valor);
      const cls = v === gMin ? 'min' : v === gMax ? 'max' : '';
      const loja = (p.estabelecimento?.nm_fan || p.estabelecimento?.nm_emp || '?').substring(0, 40);
      return `<tr>
        <td class="val ${cls}">R$ ${v.toFixed(2)}</td>
        <td>${loja}</td>
        <td class="ago">${p.tempo || ''}</td>
      </tr>`;
    }).join('');

    body.innerHTML = `
      <div class="desc-list">${descHtml}</div>
      <table class="vendas-table">
        <thead><tr><th>preço</th><th>estabelecimento</th><th>quando</th></tr></thead>
        <tbody>${vendasHtml}</tbody>
      </table>
    `;

    card.appendChild(header);
    card.appendChild(body);
    container.appendChild(card);
  }

  setStatus('', `${gtinsValidos} GTINs encontrados`);
}

// ── Watchlist ──────────────────────────────────────────────────────────────

function toggleWatch(gtin, desc, vendas) {
  const idx = watchlist.findIndex(w => w.gtin === gtin);
  if (idx >= 0) {
    watchlist.splice(idx, 1);
  } else {
    watchlist.push({ gtin, desc, vendas });
  }
  salvarWatchlist();
  atualizarUI(gtin);
  renderSidebar();
}

function atualizarUI(gtin) {
  const isWatched = watchlist.some(w => w.gtin === gtin);
  const card = document.getElementById('card-' + gtin);
  const chk  = document.getElementById('chk-' + gtin);
  if (card) card.classList.toggle('selected', isWatched);
  if (chk)  chk.classList.toggle('checked', isWatched);
}

function renderSidebar() {
  const el    = document.getElementById('watchlist');
  const badge = document.getElementById('watch-count');
  const btn   = document.getElementById('btn-export');

  badge.textContent = watchlist.length;
  btn.disabled = watchlist.length === 0;

  if (!watchlist.length) {
    el.innerHTML = `<div class="watchlist-empty">nenhum produto selecionado ainda.<br>marque os checkboxes ao buscar.</div>`;
    return;
  }

  el.innerHTML = watchlist.map(w => `
    <div class="watch-item">
      <div class="watch-dot"></div>
      <div class="watch-info">
        <div class="watch-name">${w.desc}</div>
        <div class="watch-gtin">${w.gtin}</div>
      </div>
      <button class="watch-remove" onclick="remover('${w.gtin}')" title="remover">×</button>
    </div>
  `).join('');
}

function remover(gtin) {
  watchlist = watchlist.filter(w => w.gtin !== gtin);
  salvarWatchlist();
  atualizarUI(gtin);
  renderSidebar();
}

function limparLista() {
  if (!watchlist.length) return;
  if (!confirm('Limpar toda a lista?')) return;
  const gtins = watchlist.map(w => w.gtin);
  watchlist = [];
  salvarWatchlist();
  gtins.forEach(atualizarUI);
  renderSidebar();
}

function salvarWatchlist() {
  localStorage.setItem('watchlist', JSON.stringify(watchlist));
}

// ── Exportar ───────────────────────────────────────────────────────────────

function exportar() {
  if (!watchlist.length) return;

  const linhas = watchlist.map(w =>
    `    ("${w.gtin}", "${w.desc.replace(/"/g, '\\"')}", 5),`
  ).join('\n');

  const codigo = `# Cole isso no seu coletor.py, substituindo PRODUTOS_MONITORADOS:

PRODUTOS_MONITORADOS = [
${linhas}
]

# Formato: (gtin, descricao_referencia, raio_km)
# Ajuste o raio_km conforme necessário.
`;

  navigator.clipboard.writeText(codigo).then(() => {
    mostrarToast('copiado para a área de transferência!');
  });
}

// ── Utils ──────────────────────────────────────────────────────────────────

function setStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status-bar ' + type;
  el.innerHTML = msg;
}

function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
renderSidebar();
</script>
</body>
</html>
